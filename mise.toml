[tools]
node = "24.15.0"
pnpm = "11.2.2"
# Rust toolchain for the desktop shell (packages/desktop).
rust = "1.94.1"
# Deterministic TS/JS static analysis (duplication, complexity, dead code,
# changed-file PR audits). Prebuilt binary from GitHub releases.
"github:fallow-rs/fallow" = "2.85.0"

[env]
# Keep the daemon bound to localhost by default; override per-workspace when
# remote (Tailscale) review is intentional.
DIFFECTD_HOST = "127.0.0.1"

[tasks.build]
description = "Build all packages"
run = "pnpm -r build"

[tasks.daemon]
description = "Serve the review UI + API; pass -- --workspace <repo>"
depends = ["build"]
run = "node {{config_root}}/packages/core/dist/daemon-bin.js"

[tasks.desktop]
description = "Build everything and run the desktop app (Tauri shell over diffectd)"
depends = ["build"]
run = "cargo run --manifest-path {{config_root}}/packages/desktop/src-tauri/Cargo.toml"

[tasks."desktop:dev"]
description = "Desktop shell against the Vite dev server (run `mise run dev` + `mise run daemon` separately)"
run = "cargo run --manifest-path {{config_root}}/packages/desktop/src-tauri/Cargo.toml"
env = { DIFFECT_DESKTOP_URL = "http://127.0.0.1:5173" }

[tasks.dev]
description = "Web UI dev server (Vite, hot reload)"
run = "pnpm --filter @diffect/web dev"

[tasks.test]
description = "Run the test suite"
run = "pnpm test"
