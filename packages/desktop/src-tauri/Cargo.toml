[package]
name = "diffect-desktop"
version = "0.1.0"
description = "Diffect desktop shell: a Tauri window over a private diffectd"
license = "Apache-2.0"
edition = "2021"
publish = false

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["unstable"] }
tauri-plugin-single-instance = "2"
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
url = "2"
rusqlite = { version = "0.32", features = ["bundled"] }

[profile.release]
strip = true
lto = true
