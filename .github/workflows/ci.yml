name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  js:
    name: JS, web, and e2e
    runs-on: ubuntu-24.04
    container: mcr.microsoft.com/playwright:v1.61.0-noble
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: corepack prepare pnpm@11.9.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:release-version
      - run: pnpm build
      - run: pnpm --filter @diffect/e2e test

  tauri:
    name: Tauri cargo check
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - run: rustup toolchain install 1.94.1 --profile minimal
      - run: cargo +1.94.1 check --manifest-path packages/desktop/src-tauri/Cargo.toml
